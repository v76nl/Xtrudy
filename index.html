<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D to 3D Extruder - キーホルダーやハンコ作成</title>

    <!-- ES Module のインポートマップ (Three.js / clipper2-js) -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
                "clipper2-js": "https://cdn.jsdelivr.net/npm/clipper2-js@1.2.4/fesm2020/clipper2-js.mjs"
            }
        }
    </script>

    <!-- フォント読み込みに使う opentype.js (グローバル変数 opentype を提供) -->
    <script src="https://unpkg.com/opentype.js@1.3.4/dist/opentype.min.js"></script>

    <!-- Tailwind CSS (ユーティリティクラスによるレイアウト) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- フォント読み込み中に表示するオーバーレイ -->
    <div id="loading">処理中……</div>

    <!-- 左サイドのコントロールパネル (非表示時は collapsed クラスが付く) -->
    <div id="ui-panel">
        <h1 class="text-xl font-bold mb-4 text-blue-600">2D to 3D Extruder</h1>

        <!-- 概算サイズ表示 (モデル全体の AABB から計算) -->
        <div class="control-group">
            <label class="control-label">概算サイズ</label>
            <div id="dimensions-info" class="info-display">
                W: 0 mm<br>H: 0 mm<br>D: 0 mm
            </div>
        </div>

        <!-- 入力ソース選択とその設定 (テキスト / SVG を切り替え) -->
        <div class="control-group">
            <label class="control-label mb-2">入力ソース</label>
            <div class="flex gap-2 mb-3">
                <button id="mode-text" class="flex-1 py-1 px-2 btn-mode-active rounded text-sm transition">テキスト</button>
                <button id="mode-svg" class="flex-1 py-1 px-2 btn-mode-inactive rounded text-sm transition">SVG</button>
            </div>

            <!-- テキストモード用コントロール -->
            <div id="controls-text">
                <label class="control-label">テキスト</label>
                <input type="text" id="input-text" class="mb-2">

                <label class="control-label">フォント</label>
                <select id="font-select" class="mb-2">
                    <option value="sans">Noto Sans JP（ゴシック）</option>
                    <option value="serif">Noto Serif JP（明朝）</option>
                    <option value="dot">DotGothic16</option>
                    <option value="ramp">Rampart One</option>
                </select>

                <div class="slider-container">
                    <label class="slider-label">文字サイズ</label>
                    <input type="range" id="text-size" min="5" max="100">
                </div>
                <div class="slider-container">
                    <label class="slider-label">字間</label>
                    <input type="range" id="text-spacing" min="-5" max="20" step="0.5">
                </div>
            </div>

            <!-- SVGモード用コントロール -->
            <div id="controls-svg" style="display: none;">
                <label class="control-label">SVGファイル</label>
                <input type="file" id="input-file" accept=".svg" class="mb-2">
                <div class="slider-container">
                    <label class="slider-label">スケール</label>
                    <input type="range" id="svg-scale" min="0.1" max="5.0" step="0.1">
                </div>
            </div>

            <!-- 共通: 押し出し厚みと左右反転 (左右反転はハンコ用) -->
            <div class="slider-container mt-2">
                <label class="slider-label">厚み</label>
                <input type="range" id="model-thickness" min="1" max="20" step="0.5">
                <span id="val-thickness" class="text-xs w-8 text-right font-mono"></span>
            </div>
            <div class="flex items-center justify-between mt-2">
                <label class="text-xs font-bold" for="mirror-x">左右反転</label>
                <input type="checkbox" id="mirror-x" class="w-4 h-4 accent-blue-600">
            </div>
        </div>

        <!-- 土台プレート設定 (メインモデルの背面に貼り付く平板) -->
        <div class="control-group">
            <div class="flex items-center justify-between mb-2">
                <label class="control-label m-0">土台</label>
                <input type="checkbox" id="base-enable" class="w-4 h-4 accent-blue-600">
            </div>
            <!-- opacity / pointer-events は JS の initUIFromState() で制御 -->
            <div id="controls-base" style="transition: opacity 0.2s;">
                <div class="slider-container">
                    <label class="slider-label">余白</label>
                    <input type="range" id="base-padding" min="0" max="20" step="0.5">
                </div>
                <div class="slider-container">
                    <label class="slider-label">厚み</label>
                    <input type="range" id="base-thickness" min="0.5" max="10" step="0.5">
                </div>
                <div class="slider-container">
                    <label class="slider-label">角丸</label>
                    <input type="range" id="base-radius" min="0" max="20" step="0.5">
                </div>
            </div>
        </div>

        <!-- ストラップリング設定 (キーホルダー用の穴あきリング) -->
        <div class="control-group">
            <div class="flex items-center justify-between mb-2">
                <label class="control-label m-0">ストラップリング</label>
                <input type="checkbox" id="ring-enable" class="w-4 h-4 accent-blue-600">
            </div>
            <div id="controls-ring">
                <label class="control-label mt-1">形状</label>
                <!-- 値は segment 数。32=真円(中空円柱)、その他=トーラス -->
                <select id="ring-shape" class="mb-2">
                    <option value="32">真円</option>
                    <option value="4">正方形</option>
                    <option value="3">正三角形</option>
                    <option value="5">正五角形</option>
                </select>

                <!-- 補強板: 真円選択時のみ表示。表示制御は updateReinforceVisibility() が行う -->
                <div id="ctrl-ring-reinforce" class="flex items-center justify-between mb-1">
                    <label class="text-xs font-bold text-blue-500" for="ring-reinforce">補強板</label>
                    <input type="checkbox" id="ring-reinforce" class="w-4 h-4 accent-blue-600">
                </div>

                <div class="flex items-center justify-between mb-1">
                    <label class="text-xs font-bold text-blue-500">上端に自動配置</label>
                    <input type="checkbox" id="ring-auto-y" class="w-4 h-4 accent-blue-500">
                </div>

                <!-- スライダーと数値入力の双方向バインド -->
                <div class="slider-container">
                    <label class="slider-label">X座標</label>
                    <input type="range" id="ring-x" min="-100" max="100" step="0.5">
                    <input type="number" id="val-ring-x" class="slider-val" step="0.5">
                </div>
                <div class="slider-container">
                    <label class="slider-label">Y座標</label>
                    <input type="range" id="ring-y" min="-100" max="100" step="0.5">
                    <input type="number" id="val-ring-y" class="slider-val" step="0.5">
                </div>
                <div class="slider-container">
                    <label class="slider-label">サイズ</label>
                    <input type="range" id="ring-size" min="1" max="20" step="0.5">
                    <input type="number" id="val-ring-size" class="slider-val" step="0.5">
                </div>
                <div class="slider-container">
                    <label class="slider-label">太さ</label>
                    <input type="range" id="ring-tube" min="0.5" max="5" step="0.1">
                    <input type="number" id="val-ring-tube" class="slider-val" step="0.1">
                </div>
                <div class="slider-container">
                    <label class="slider-label">回転</label>
                    <input type="range" id="ring-rot" min="0" max="360" step="15">
                    <input type="number" id="val-ring-rot" class="slider-val" step="15">
                </div>
            </div>
        </div>

        <!-- STL バイナリ形式でエクスポート -->
        <div class="control-group border-none">
            <button id="btn-export" class="btn">STLを出力</button>
        </div>
    </div>

    <!-- サイドパネルの表示/非表示トグルボタン -->
    <button id="toggle-ui">UIを隠す</button>

    <!-- ナビゲーションギズモ (右上固定。canvas は Three.js が別レンダラーで描画) -->
    <div id="gizmo-container">
        <canvas id="gizmo-canvas" width="120" height="120"></canvas>
    </div>

    <!-- メインの WebGL キャンバス -->
    <canvas id="gl-canvas"></canvas>

    <script type="module" src="main.js"></script>
</body>
</html>
