<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D to 3D Extruder - キーホルダーやハンコ作成</title>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
                "clipper2-js": "https://cdn.jsdelivr.net/npm/clipper2-js@1.2.4/fesm2020/clipper2-js.mjs"
            }
        }
    </script>
    <script src="https://unpkg.com/opentype.js@1.3.4/dist/opentype.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="loading">Processing...</div>

    <div id="ui-panel">
        <h1 class="text-xl font-bold mb-4 text-blue-600">2D to 3D Extruder</h1>

        <div class="control-group">
            <label class="control-label">Dimensions (approx)</label>
            <div id="dimensions-info" class="info-display">
                W: 0 mm<br>H: 0 mm<br>D: 0 mm
            </div>
        </div>

        <div class="control-group">
            <label class="control-label mb-2">Input Source</label>
            <div class="flex gap-2 mb-3">
                <button id="mode-text" class="flex-1 py-1 px-2 btn-mode-active rounded text-sm transition">Text</button>
                <button id="mode-svg" class="flex-1 py-1 px-2 btn-mode-inactive rounded text-sm transition">SVG</button>
            </div>

            <div id="controls-text">
                <label class="control-label">Text</label>
                <input type="text" id="input-text" value="印刷物" class="mb-2">
                
                <label class="control-label">Font</label>
                <select id="font-select" class="mb-2">
                    <option value="sans">Noto Sans JP (Gothic)</option>
                    <option value="serif">Noto Serif JP (Mincho)</option>
                    <option value="dot">DotGothic16</option>
                    <option value="ramp">Rampart One</option>
                </select>

                <div class="slider-container">
                    <label class="slider-label">Size</label>
                    <input type="range" id="text-size" min="5" max="100" value="10">
                </div>
                <div class="slider-container">
                    <label class="slider-label">Spacing</label>
                    <input type="range" id="text-spacing" min="-5" max="20" step="0.5" value="1">
                </div>
            </div>

            <div id="controls-svg" style="display: none;">
                <label class="control-label">SVG File</label>
                <input type="file" id="input-file" accept=".svg" class="mb-2">
                <div class="slider-container">
                    <label class="slider-label">Scale</label>
                    <input type="range" id="svg-scale" min="0.1" max="5.0" step="0.1" value="1.0">
                </div>
            </div>

            <div class="slider-container mt-2">
                <label class="slider-label">Thick</label>
                <input type="range" id="model-thickness" min="1" max="20" step="0.5" value="3">
                <span id="val-thickness" class="text-xs w-8 text-right font-mono">3mm</span>
            </div>
            <div class="flex items-center justify-between mt-2">
                <label class="text-xs font-bold" for="mirror-x">左右反転</label>
                <input type="checkbox" id="mirror-x" class="w-4 h-4 accent-blue-600">
            </div>
        </div>

        <div class="control-group">
            <div class="flex items-center justify-between mb-2">
                <label class="control-label m-0">Base Plate (Auto)</label>
                <input type="checkbox" id="base-enable" checked class="w-4 h-4 accent-blue-600">
            </div>
            <div id="controls-base" style="opacity: 1; pointer-events: auto; transition: opacity 0.2s;">
                <div class="slider-container">
                    <label class="slider-label">Pad</label>
                    <input type="range" id="base-padding" min="0" max="20" step="0.5" value="2">
                </div>
                <div class="slider-container">
                    <label class="slider-label">Thick</label>
                    <input type="range" id="base-thickness" min="0.5" max="10" step="0.5" value="2">
                </div>
                <div class="slider-container">
                    <label class="slider-label">Rad</label>
                    <input type="range" id="base-radius" min="0" max="20" step="0.5" value="1">
                </div>
            </div>
        </div>

        <div class="control-group">
            <div class="flex items-center justify-between mb-2">
                <label class="control-label m-0">Strap Ring</label>
                <input type="checkbox" id="ring-enable" checked class="w-4 h-4 accent-blue-600">
            </div>
            <div id="controls-ring">
                <label class="control-label mt-1">Shape</label>
                <select id="ring-shape" class="mb-2">
                    <option value="32">Circle (Round)</option>
                    <option value="4">Square</option>
                    <option value="3">Triangle</option>
                    <option value="5">Pentagon</option>
                </select>

                <div id="ctrl-ring-reinforce" class="flex items-center justify-between mb-1">
                    <label class="text-xs font-bold text-blue-500" for="ring-reinforce">補強板</label>
                    <input type="checkbox" id="ring-reinforce" class="w-4 h-4 accent-blue-600">
                </div>

                <div class="flex items-center justify-between mb-1">
                    <label class="text-xs font-bold text-blue-500">Auto Top Align</label>
                    <input type="checkbox" id="ring-auto-y" checked class="w-4 h-4 accent-blue-500">
                </div>

                <div class="slider-container">
                    <label class="slider-label">Pos X</label>
                    <input type="range" id="ring-x" min="-100" max="100" step="0.5" value="0">
                    <input type="number" id="val-ring-x" class="slider-val" value="0" step="0.5">
                </div>
                <div class="slider-container">
                    <label class="slider-label">Pos Y</label>
                    <input type="range" id="ring-y" min="-100" max="100" step="0.5" value="10" disabled style="opacity: 0.5;">
                    <input type="number" id="val-ring-y" class="slider-val" value="10" step="0.5" disabled style="opacity: 0.5;">
                </div>
                <div class="slider-container">
                    <label class="slider-label">Size</label>
                    <input type="range" id="ring-size" min="1" max="20" step="0.5" value="3">
                    <input type="number" id="val-ring-size" class="slider-val" value="3" step="0.5">
                </div>
                <div class="slider-container">
                    <label class="slider-label">Tube</label>
                    <input type="range" id="ring-tube" min="0.5" max="5" step="0.1" value="1">
                    <input type="number" id="val-ring-tube" class="slider-val" value="1" step="0.1">
                </div>
                <div class="slider-container">
                    <label class="slider-label">Rot</label>
                    <input type="range" id="ring-rot" min="0" max="360" step="15" value="0">
                    <input type="number" id="val-ring-rot" class="slider-val" value="0" step="15">
                </div>
            </div>
        </div>

        <div class="control-group border-none">
            <button id="btn-export" class="btn">Export STL</button>
        </div>
    </div>

    <button id="toggle-ui">Hide UI</button>
    <div id="gizmo-container">
        <canvas id="gizmo-canvas" width="120" height="120"></canvas>
    </div>
    <canvas id="gl-canvas"></canvas>

    <script type="module" src="main.js"></script>
</body>
</html>
</body>
</html>
